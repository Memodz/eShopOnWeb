name: Container Workflow
on: workflow_dispatch

env:
  ACR_LOGIN_SERVER: aistraining.azurecr.io
  TAG_NAME: eshoponweb-user039:1.0.0
  RESOURCE_GROUP: ais-training
  CLUSTER_NAME: aks-demo
  # 💡 ประกาศตัวแปร Namespace ไว้ที่นี่เพื่อความสะดวกในการจัดการ
  TARGET_NAMESPACE: eshoponweb-user039 

jobs:
  build-container:
    if: false # เปลี่ยนเป็น true หากต้องการเปิดใช้งานการ Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: ACR Login
        uses: docker/login-action@v3
        with:
          registry: ${{ env.ACR_LOGIN_SERVER }}
          username: ${{ secrets.ACR_USERNAME }}
          password: ${{ secrets.ACR_PASSWORD }}

      - name: Build and Push Image
        run: |
          docker build -f src/Web/Dockerfile -t ${{ env.ACR_LOGIN_SERVER }}/${{ env.TAG_NAME }} .
          docker push ${{ env.ACR_LOGIN_SERVER }}/${{ env.TAG_NAME }}

  deploy-to-aks:
    # needs: build-container # เอาคอมเมนต์ออกหากต้องการให้รันต่อจาก build-container
    runs-on: ubuntu-latest
    steps:
       - name: Checkout Code
         uses: actions/checkout@v4

       - name: Set AKS Context
         uses: azure/aks-set-context@v3
         with:
           creds: ${{ secrets.AZURE_CREDENTIALS }}
           resource-group: ${{ env.RESOURCE_GROUP }}
           cluster-name: ${{ env.CLUSTER_NAME }}
           
       - name: Create Registry Secret in AKS
         uses: azure/k8s-create-secret@v1
         with:
           namespace: ${{ env.TARGET_NAMESPACE }} # 💡 เพิ่ม Namespace ตรงนี้
           container-registry-url: ${{ env.ACR_LOGIN_SERVER }}
           container-registry-username: ${{ secrets.ACR_USERNAME }}
           container-registry-password: ${{ secrets.ACR_PASSWORD }}
           secret-name: aks-secret

       - name: Deploy to Kubernetes Cluster
         uses: azure/k8s-deploy@v1
         with:
            namespace: ${{ env.TARGET_NAMESPACE }} # 💡 เพิ่ม Namespace ตรงนี้เพื่อแก้ปัญหารอบก่อน
            manifests: |
              ./k8s/deployment.yaml
              ./k8s/service.yaml
            images: ${{ env.ACR_LOGIN_SERVER }}/${{ env.TAG_NAME }}
